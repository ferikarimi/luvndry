{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مدیریت سایت</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>
<body>
    {% include 'front/header.html' %}
    {% include 'front/popup.html' %}

<div class="container mt-4">
<h2>مدیریت کامنت‌ها</h2>
<div id="commentsList"></div>

<hr>

<h2>مدیریت عکس‌های گالری</h2>
<form id="galleryForm">
    <input type="text" name="title" placeholder="عنوان عکس">
    <input type="file" name="image">
    <button type="submit">آپلود عکس</button>
</form>
<div id="galleryList"></div>


<h2 class="mt-4">مدیریت نوتیفیکیشن‌ها</h2>

<!-- فرم ایجاد / ویرایش -->
<div class="card p-3 mb-4">
    <h4 id="formTitle">ایجاد نوتیفیکیشن جدید</h4>

    <form id="notifForm">
        <input type="hidden" id="notifId">

        <div class="mb-3">
            <label class="form-label">عنوان</label>
            <input type="text" id="title" class="form-control" placeholder="عنوان نوتیف">
        </div>

        <div class="mb-3">
            <label class="form-label">متن نوتیف</label>
            <textarea id="message" class="form-control" placeholder="متن نوتیف" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">فعال باشد؟</label>
            <select id="is_active" class="form-control">
                <option value="true">بله</option>
                <option value="false">خیر</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">ثبت</button>
        <button type="button" class="btn btn-secondary" id="cancelEdit" style="display:none;">لغو ویرایش</button>
    </form>
</div>

<!-- فیلترها -->
<div class="mb-3">
    <label>فیلتر:</label>
    <select id="filter" class="form-select w-auto d-inline-block">
        <option value="all">همه</option>
        <option value="active">فعال</option>
        <option value="inactive">غیرفعال</option>
    </select>
</div>

<!-- لیست نوتیفیکیشن‌ها -->
<div id="notifList"></div>


<meta name="csrf-token" content="{{ csrf_token }}">


<link rel="stylesheet" href="{% static 'css/site_managment.css' %}">
<script src="{% static 'js/site_managment.js' %}"></script>


<a href="{% url 'admin_home_page' %}" class="btn-back">بازگشت</a>


</div>
</body>
</html>
