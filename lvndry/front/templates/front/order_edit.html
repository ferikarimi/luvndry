{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ویرایش سفارش</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>
<body>
  {% include 'front/header.html' %}
  {% include 'front/popup.html' %}


<h1>✏️ ویرایش سفارش</h1>

<div class="container mt-4">
<div id="message" class="message"></div>
<div id="orderInfo" style="margin-bottom:15px; font-weight:bold;"></div>

<form id="updateOrderForm">
  <div id="itemsContainer"></div>
  <button type="button" id="addItemBtn">➕ اضافه کردن آیتم</button><br><br>

  تخفیف: 
  <select id="discountSelect">
    <option value="0">بدون تخفیف</option>
  </select><br><br>

  مبلغ کل (بعد از تخفیف): 
  <input type="number" id="grandTotal" readonly><br><br>

  <div id="orderData" data-order-id="{{ order_id }}"></div>
  <button type="submit">💾 ذخیره تغییرات</button>
</form>

<a href="{% url 'recent_orders' %}" class="btn-back">بازگشت</a>


<link rel="stylesheet" href="{% static 'css/order_edit.css' %}">
<script src="{% static 'js/order_edit.js' %}"></script>


</div>
</body>
</html>
