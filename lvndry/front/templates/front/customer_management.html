<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>مدیریت مشتری</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">مدیریت مشتری</h2>

  <!-- بخش سرچ مشتری -->
  <form id="customerForm">
    <input type="text" name="code" placeholder="کد مشتری">
    <input type="text" name="phone" placeholder="شماره مشتری">
    <button type="submit">جستجو</button>
  </form>

  <div id="customerResult"></div>
  <button id="editCustomerBtn" style="display:none;">ویرایش مشتری</button>

  <div id="editCustomerFormDiv" style="display:none;">
    <form id="editCustomerForm">
      <input type="text" name="phone" placeholder="شماره تلفن">
      <input type="text" name="fullname" placeholder="نام کامل">
      <input type="text" name="address" placeholder="آدرس">
      <button type="submit">ثبت تغییرات</button>
    </form>
    <div class="edit-loading" style="display:none;">در حال ذخیره...</div>
    <div class="edit-error-message" style="color:red;"></div>
    <div class="edit-success-message" style="color:green; display:none;">ویرایش با موفقیت انجام شد!</div>
  </div>

  <div id="customerResult"></div>
  <div class="loading" style="display:none;">در حال جستجو...</div>
  <div class="error-message" style="color:red;"></div>
  
  <script>
  function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
      const cookies = document.cookie.split(';');
      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.substring(0, name.length + 1) === (name + '=')) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
          break;
        }
      }
    }
    return cookieValue;
  }
  
  const csrftoken = getCookie('csrftoken');

  const form = document.getElementById('customerForm');
  const loading = form.parentElement.querySelector('.loading');
  const errorMessage = form.parentElement.querySelector('.error-message');
  const customerResult = document.getElementById('customerResult');
  const editBtn = document.getElementById('editCustomerBtn');
  const editFormDiv = document.getElementById('editCustomerFormDiv');
  const editForm = document.getElementById('editCustomerForm');
  const editLoading = editFormDiv.querySelector('.edit-loading');
  const editError = editFormDiv.querySelector('.edit-error-message');
  const editSuccess = editFormDiv.querySelector('.edit-success-message');

  
  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }
  
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMessage.textContent = '';
    customerResult.innerHTML = '';
    editBtn.style.display = 'none';
    editFormDiv.style.display = 'none';
    loading.style.display = 'block';
  
    const codeVal = form.code.value.trim();
    const phoneVal = form.phone.value.trim();
  
    if (!codeVal && !phoneVal) {
      loading.style.display = 'none';
      errorMessage.textContent = 'لطفاً کد یا شماره مشتری را وارد کنید.';
      return;
    }
  
    let url = `/customers/customerfind/?`;
    if (codeVal) url += `code=${encodeURIComponent(codeVal)}`;
    else url += `phone=${encodeURIComponent(phoneVal)}`;
  
    try {
      const response = await fetch(url, {
        method: 'GET',
        credentials: 'same-origin',
        headers: { 'Accept': 'application/json' }
      });
  
      loading.style.display = 'none';
      
      if (!response.ok) {
        // داده‌ها میتونه یک دیکشنری باشه
        if (typeof data === 'object') {
          const messages = [];
          for (const key in data) {
            if (Array.isArray(data[key])) {
              messages.push(`${key}: ${data[key].join(', ')}`);
            } else {
              messages.push(`${key}: ${data[key]}`);
            }
          }
          editError.textContent = messages.join(' | ');
        } else {
          editError.textContent = data.detail || 'خطایی رخ داده.';
        }
      }

  
      const data = await response.json();
      customerResult.innerHTML = `
        <div>
          <p><strong>کد مشتری:</strong> ${escapeHtml(data.code)}</p>
          <p><strong>اسم :</strong> ${escapeHtml(data.fullname)}</p>
          <p><strong>شماره تلفن:</strong> ${escapeHtml(data.phone)}</p>
          <p><strong>آدرس :</strong> ${escapeHtml(data.address)}</p>

        </div>
      `;

      editBtn.style.display = 'inline-block';
      editForm.phone.value = data.phone;

    } catch (err) {
      loading.style.display = 'none';
      errorMessage.textContent = 'خطای شبکه. لطفاً دوباره تلاش کنید.';
      console.error(err);
    }
  });
  // ویرایش مشتری
  editBtn.addEventListener('click', () => {
    editFormDiv.style.display = 'block';
  });

  editForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    editError.textContent = '';
    editSuccess.style.display = 'none';
    editLoading.style.display = 'block';

    const phoneVal = editForm.phone.value.trim();
    const fullnameVal = editForm.fullname.value.trim();
    const addressVal = editForm.address.value.trim();

    if (!phoneVal) {
      editLoading.style.display = 'none';
      editError.textContent = 'شماره را وارد کنید.';
      return;
    }

    try {
      const response = await fetch('/customers/customerupdateprofile/', {
        method: 'PATCH',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': csrftoken || ''
        },
        body: JSON.stringify({
          phone: phoneVal ,
          fullname: fullnameVal,
          address: addressVal
        })

      });

      editLoading.style.display = 'none';
      const data = await response.json();

      if (response.ok) {
        editSuccess.style.display = 'block';

        customerResult.innerHTML = `
        <div>
          <p><strong>کد مشتری:</strong> ${escapeHtml(data.code)}</p>
          <p><strong>شماره تلفن:</strong> ${escapeHtml(data.phone)}</p>
          <p><strong>نام کامل:</strong> ${escapeHtml(data.fullname || 'ناشناس')}</p>
          <p><strong>آدرس:</strong> ${escapeHtml(data.address || '')}</p>
        </div>
      `;
      editForm.phone.value = data.phone;
      editForm.fullname.value = data.fullname;
      editForm.address.value = data.address;
    } else {
      editError.textContent = data.phone || 'خطایی رخ نداد.';
    }
    } catch (err) {
      editLoading.style.display = 'none';
      editError.textContent = 'خطای شبکه. دوباره تلاش کنید.';
      console.error(err);
    }
  });
  </script>
