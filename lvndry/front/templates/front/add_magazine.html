{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مدیریت مجله‌ها</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <script src="https://cdn.ckeditor.com/4.22.1/full/ckeditor.js"></script>
  <link rel="stylesheet" href="{% static 'css/site_managment.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
  {% include 'front/header.html' %}
  {% include "front/popup.html" %}

<div class="container mt-4">
  <h1>مدیریت مجله‌ها</h1>

  <div id="magazineMessage" class="message-box"></div>
  <div class="card mb-4 p-3">
    <h5>اضافه / ویرایش مقاله</h5>
    <form id="articleForm">
      <input type="hidden" id="articleId">

      <div class="mb-2">
        <input type="text" id="title" name="title" class="form-control" placeholder="عنوان مقاله" required>
      </div>

      <div class="mb-2">
        <textarea id="summary" name="summary" class="form-control" placeholder="خلاصه مقاله"></textarea>
      </div>

      <div class="mb-2">
        <textarea id="content" name="content" class="form-control" placeholder="متن کامل مقاله"></textarea>
      </div>

      <div class="mb-2">
        <input type="file" id="image" name="image" class="form-control">
      </div>

      <div class="mb-2 form-check">
        <input type="checkbox" id="isActive" name="isActive" class="form-check-input" checked>
        <label class="form-check-label">فعال</label>
      </div>

      <button type="submit" class="btn btn-primary">ارسال</button>
      <button type="button" id="resetForm" class="btn btn-secondary">پاک کردن فرم</button>
    </form>
  </div>

  <div class="mb-3">
    <button id="showActive" class="btn btn-success">نمایش مقالات فعال</button>
    <button id="showInactive" class="btn btn-warning">نمایش مقالات غیر فعال</button>
    <button id="showAll" class="btn btn-info">نمایش همه مقالات</button>
  </div>
  <hr>

  <div id="articlesList" class="row g-3"></div>
  <a href="{% url 'admin_home_page' %}" class="btn-back">بازگشت</a>
  <link rel="stylesheet" href="{% static 'css/add_magazine.css' %}">
  <script src="{% static 'js/add_magazine.js' %}"></script>

</div>
</body>
</html>
