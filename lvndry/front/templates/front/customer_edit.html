{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>ویرایش اطلاعات مشتری</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/customer_edit.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>

  {% include 'front/header.html' %}
  {% include 'front/popup.html' %}

  <main class="site-main edit-container mt-4">

    <h2 class="mb-3">✏️ ویرایش اطلاعات مشتری</h2>

    <form id="editCustomerForm" class="row g-3">
      <div class="col-12 col-md-6">
        <label for="code" class="form-label">کد مشتری:</label>
        <input type="text" id="code" class="form-control" readonly>
      </div>

      <div class="col-12 col-md-6">
        <label for="fullname" class="form-label">نام کامل:</label>
        <input type="text" id="fullname" class="form-control">
      </div>

      <div class="col-12 col-md-6">
        <label for="phone" class="form-label">شماره تلفن:</label>
        <input type="text" id="phone" class="form-control">
      </div>

      <div class="col-12">
        <label for="address" class="form-label">آدرس:</label>
        <input type="text" id="address" class="form-control">
      </div>

      <div class="col-12">
        <button type="button" id="saveBtn" class="btn btn-primary">💾 ذخیره تغییرات</button>
        <div id="message" class="mt-2"></div>
      </div>
    </form>
  </main>

  <a href="{% url 'customer_management' %}" class="btn-back1">بازگشت به لیست مشتریان</a>
  <a href="{% url 'admin_home_page' %}" class="btn-back">بازگشت به داشبورد</a>

  <script src="{% static 'js/customer_edit.js' %}"></script>
</body>
</html>
