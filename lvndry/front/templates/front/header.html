{% load static %}

<header id="header" class="header d-flex align-items-center sticky-top">
  <div class="container position-relative d-flex align-items-center justify-content-between">

    <a href="{% url 'home' %}" class="logo d-flex align-items-center me-auto me-xl-0">
      <img src="{% static 'img/logo/logo.png' %}" alt="لوگو" class="logo-img">
    </a>

    <nav id="navmenu" class="navmenu">
      <ul>
        <li><a href="{% url 'customer_acceptance' %}" class="btn btn-custom btn-lg">پذیرش مشتری</a></li>
        <li><a href="{% url 'laundry_management' %}" class="btn btn-custom btn-lg">مدیریت خشکشویی</a></li>
        <li><a href="{% url 'site_management' %}" class="btn btn-custom btn-lg">مدیرت سایت</a></li>
        <li><a href="{% url 'customer_management' %}" class="btn btn-custom btn-lg">مدیریت مشتری</a></li>
        <li><a href="{% url 'recent_orders' %}" class="btn btn-custom btn-lg">مدیرت سفارش</a></li>
        <li><a href="{% url 'add_magazine' %}" class="btn btn-custom btn-lg">مدیرت مجله‌ها</a></li>
      </ul>

      <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
    </nav>

  </div>
</header>

<style>
.header {
  background-color: #14324a;
  padding: 3px 0;
  position: sticky;
  top: 0;
  z-index: 9999;
}

.header .logo img {
  max-height: 99px;
}

.navmenu ul {
  display: flex;
  gap: 15px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.navmenu a {
  color: #fff;
  text-decoration: none;
  font-weight: 500;
  padding: 5px 10px;
}

.mobile-nav-toggle {
  display: none;
  font-size: 28px;
  cursor: pointer;
  color: #fff;
}

@media (max-width: 992px) {
  .navmenu ul {
    display: none;
    flex-direction: column;
    background-color: #dafefb;
    position: fixed;
    top: 60px;
    right: 20px;
    left: 20px;
    padding: 20px;
    border-radius: 8px;
    z-index: 9998;
    text-align: right;
  }

  .navmenu ul.show {
    display: flex;
  }

  .navmenu a {
    color: #000;
    padding: 10px 0;
    font-weight: 500;
    text-decoration: none;
  }

  .mobile-nav-toggle {
    display: block;
    color: #fff;
  }
}

body.mobile-nav-active {
  overflow: hidden;
}

.navmenu a {
  font-size: 16px;
}

</style>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const toggleBtn = document.querySelector('.mobile-nav-toggle');
    const navUl = document.querySelector('.navmenu ul');
  
    toggleBtn.addEventListener('click', () => {
      document.body.classList.toggle('mobile-nav-active');
      toggleBtn.classList.toggle('bi-list');
      toggleBtn.classList.toggle('bi-x');
      navUl.classList.toggle('show');
    });
  
    document.querySelectorAll('.navmenu ul li a').forEach(link => {
      link.addEventListener('click', () => {
        if (document.body.classList.contains('mobile-nav-active')) {
          document.body.classList.remove('mobile-nav-active');
          toggleBtn.classList.add('bi-list');
          toggleBtn.classList.remove('bi-x');
          navUl.classList.remove('show');
        }
      });
    });
  });
</script>
