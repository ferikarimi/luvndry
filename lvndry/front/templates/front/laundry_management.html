<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مدیریت خدمات و لباس‌ها</title>
<style>
body { font-family: sans-serif; margin: 20px; }
h2 { margin-top: 40px; }
input, button { margin: 5px 0; padding: 5px; }
.itemDiv { margin-bottom: 10px; border: 1px solid #ccc; padding: 10px; }
.message { color: #333; margin-bottom: 10px; }
</style>
</head>
<body>

<h1>مدیریت خدمات و لباس‌ها</h1>
<div id="message" class="message"></div>

<!-- ================== Services ================== -->
<h2>مدیریت خدمات</h2>
<form id="addServiceForm">
  نام خدمت: <input type="text" name="name" required><br>
  قیمت پایه: <input type="number" name="base_price" required><br>
  <button type="submit">➕ افزودن خدمت</button>
</form>

<form id="editServiceForm">
  نام فعلی: <input type="text" name="old_name" required><br>
  نام جدید: <input type="text" name="name"><br>
  قیمت جدید: <input type="number" name="base_price"><br>
  <button type="submit">✏️ ویرایش خدمت</button>
</form>

<form id="deleteServiceForm">
  نام خدمت برای حذف: <input type="text" name="name" required>
  <button type="submit">🗑️ حذف خدمت</button>
</form>

<div id="servicesList"></div>

<hr>

<!-- ================== Clothes ================== -->
<h2>مدیریت لباس‌ها</h2>
<form id="addClothForm">
  نام لباس: <input type="text" name="name" required><br>
  ضریب قیمت: <input type="number" name="price_modifier" required><br>
  <button type="submit">➕ افزودن لباس</button>
</form>

<form id="editClothForm">
  نام فعلی: <input type="text" name="old_name" required><br>
  نام جدید: <input type="text" name="name"><br>
  ضریب قیمت جدید: <input type="number" name="price_modifier"><br>
  <button type="submit">✏️ ویرایش لباس</button>
</form>

<form id="deleteClothForm">
  نام لباس برای حذف: <input type="text" name="name" required>
  <button type="submit">🗑️ حذف لباس</button>
</form>

<div id="clothesList"></div>

<script>
const messageDiv = document.getElementById("message");
const servicesList = document.getElementById("servicesList");
const clothesList = document.getElementById("clothesList");

// گرفتن CSRF
function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let cookie of cookies) {
      cookie = cookie.trim();
      if (cookie.startsWith(name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}
const csrftoken = getCookie('csrftoken');

// ================== Services ==================
async function fetchServices(){
  try {
    const res = await fetch('/items/allservices/');
    const data = await res.json();
    servicesList.innerHTML = "<h3>لیست خدمات:</h3>";
    data.forEach(s=>{
      const div = document.createElement("div");
      div.classList.add("itemDiv");
      div.textContent = `نام: ${s.name} | قیمت: ${s.base_price}`;
      servicesList.appendChild(div);
    });
  } catch(err){ console.error(err); }
}

document.getElementById("addServiceForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const payload = Object.fromEntries(new FormData(e.target).entries());
  const res = await fetch('/items/servicesadd/', {
    method:"POST", headers:{'Content-Type':'application/json','X-CSRFToken':csrftoken},
    body: JSON.stringify(payload)
  });
  if(res.ok){ messageDiv.textContent="✅ خدمت اضافه شد"; e.target.reset(); fetchServices(); }
  else messageDiv.textContent="❌ خطا در افزودن خدمت";
});

document.getElementById("editServiceForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  const oldName = fd.get("old_name");
  const payload = Object.fromEntries(fd.entries());
  delete payload.old_name;
  const res = await fetch(`/items/servicesedit/${oldName}/`, {
    method:"PATCH", headers:{'Content-Type':'application/json','X-CSRFToken':csrftoken},
    body: JSON.stringify(payload)
  });
  if(res.ok){ messageDiv.textContent="✏️ خدمت ویرایش شد"; e.target.reset(); fetchServices(); }
  else messageDiv.textContent="❌ خطا در ویرایش خدمت";
});

document.getElementById("deleteServiceForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const name = new FormData(e.target).get("name");
  const res = await fetch(`/items/servicesdelete/${name}/`, {
    method:"DELETE", headers:{'X-CSRFToken':csrftoken}
  });
  if(res.ok){ messageDiv.textContent="🗑️ خدمت حذف شد"; e.target.reset(); fetchServices(); }
  else messageDiv.textContent="❌ خطا در حذف خدمت";
});

// ================== Clothes ==================
async function fetchClothes(){
  try {
    const res = await fetch('/items/allclothes/');
    const data = await res.json();
    clothesList.innerHTML = "<h3>لیست لباس‌ها:</h3>";
    data.forEach(c=>{
      const div = document.createElement("div");
      div.classList.add("itemDiv");
      div.textContent = `نام: ${c.name} | ضریب قیمت: ${c.price_modifier}`;
      clothesList.appendChild(div);
    });
  } catch(err){ console.error(err); }
}

document.getElementById("addClothForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const payload = Object.fromEntries(new FormData(e.target).entries());
  const res = await fetch('/items/clothesadd/', {
    method:"POST", headers:{'Content-Type':'application/json','X-CSRFToken':csrftoken},
    body: JSON.stringify(payload)
  });
  if(res.ok){ messageDiv.textContent="✅ لباس اضافه شد"; e.target.reset(); fetchClothes(); }
  else messageDiv.textContent="❌ خطا در افزودن لباس";
});

document.getElementById("editClothForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  const oldName = fd.get("old_name");
  const payload = Object.fromEntries(fd.entries());
  delete payload.old_name;
  const res = await fetch(`/items/clothesedit/${oldName}/`, {
    method:"PATCH", headers:{'Content-Type':'application/json','X-CSRFToken':csrftoken},
    body: JSON.stringify(payload)
  });
  if(res.ok){ messageDiv.textContent="✏️ لباس ویرایش شد"; e.target.reset(); fetchClothes(); }
  else messageDiv.textContent="❌ خطا در ویرایش لباس";
});

document.getElementById("deleteClothForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const name = new FormData(e.target).get("name");
  const res = await fetch(`/items/clothesdelete/${name}/`, {
    method:"DELETE", headers:{'X-CSRFToken':csrftoken}
  });
  if(res.ok){ messageDiv.textContent="🗑️ لباس حذف شد"; e.target.reset(); fetchClothes(); }
  else messageDiv.textContent="❌ خطا در حذف لباس";
});

// ================== Init ==================
fetchServices();
fetchClothes();
</script>
</body>
</html>
