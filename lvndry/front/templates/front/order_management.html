<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مدیریت سفارش خشک‌شویی</title>
<style>
body { font-family: sans-serif; margin: 20px; }
h2 { margin-top: 40px; }
input, select, button { margin: 5px 0; padding: 5px; }
.item { margin-bottom: 10px; border: 1px solid #ccc; padding: 10px; }
.message { color: #333; margin-bottom: 10px; }
.orderRow { border:1px solid #ccc; padding:8px; margin:5px 0; }
</style>
</head>
<body>

<h1>سیستم مدیریت سفارش خشک‌شویی</h1>

<div id="message" class="message"></div>

<!-- =================== افزودن سفارش =================== -->
<h2>ثبت سفارش جدید</h2>
<form id="createOrderForm">
  شماره تلفن مشتری: <input type="text" name="phone" required><br><br>
  نام مشتری: <input type="text" name="fullname"><br><br>

  <div id="itemsContainer"></div>
  <button type="button" id="addItemBtn">➕ اضافه کردن آیتم</button><br><br>
  <button type="submit">ثبت سفارش</button>
</form>

<hr>

<!-- =================== لیست سفارش‌ها =================== -->
<h2>آخرین سفارش‌ها</h2>
<button id="loadRecentBtn">نمایش ۳۰ سفارش اخیر</button>
<div id="recentOrders"></div>

<script>
/* =================== Helpers =================== */
function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== '') {
    const cookies = document.cookie.split(';');
    for (let cookie of cookies) {
      cookie = cookie.trim();
      if (cookie.startsWith(name + '=')) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}
const csrftoken = getCookie('csrftoken');
const itemsContainer = document.getElementById('itemsContainer');
const messageDiv = document.getElementById('message');
const recentOrdersDiv = document.getElementById('recentOrders');

let servicesList = [];
let clothesList  = [];
let statusChoices = [];

/* =================== Fetch data =================== */
async function fetchServicesList() {
  const res = await fetch('/items/allservices/');
  servicesList = await res.json();
}
async function fetchClothesList() {
  const res = await fetch('/items/allclothes/');
  clothesList = await res.json();
}
async function fetchStatusChoices() {
  const res = await fetch('/orders/orderstatuschoices/');
  statusChoices = await res.json();
}

/* =================== Price helper =================== */
function getPrice(serviceId, clothId) {
  const s = servicesList.find(x => x.id == serviceId);
  const c = clothesList.find(x => x.id == clothId);
  const base   = s ? s.base_price : 0;
  const extra  = c ? c.price_modifier : 0;
  return base + extra;
}

/* =================== UI for add item =================== */
function addItem() {
  if (!servicesList.length || !clothesList.length) return;
  const div = document.createElement('div');
  div.classList.add('item');

  const serviceOptions = servicesList.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  const clothOptions = clothesList.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

  div.innerHTML = `
    خدمت: <select class="serviceId">${serviceOptions}</select>
    لباس: <select class="clothId">${clothOptions}</select>
    تعداد: <input type="number" class="quantity" value="1" min="1">
    قیمت واحد: <input type="number" class="unitPrice" readonly>
    <button type="button" class="removeBtn">❌ حذف</button>
  `;

  const serviceEl = div.querySelector('.serviceId');
  const clothEl = div.querySelector('.clothId');
  const quantityEl = div.querySelector('.quantity');
  const unitPriceEl = div.querySelector('.unitPrice');

  function updatePrice(){
    const quantity = parseInt(quantityEl.value) || 1;
    const unit = getPrice(serviceEl.value, clothEl.value);
    unitPriceEl.value = unit * quantity;
  }
  updatePrice();

  serviceEl.addEventListener('change', updatePrice);
  clothEl.addEventListener('change', updatePrice);
  quantityEl.addEventListener('input', updatePrice);
  div.querySelector('.removeBtn').addEventListener('click', ()=>div.remove());

  itemsContainer.appendChild(div);
}

/* =================== Create Order =================== */
async function createOrder(e){
  e.preventDefault();
  const phone = e.target.phone.value.trim();
  const fullname = e.target.fullname.value.trim();
  const rows = itemsContainer.querySelectorAll('.item');
  if(!rows.length){ messageDiv.textContent="حداقل یک آیتم لازم است."; return; }
  const items = Array.from(rows).map(r=>({
    service: parseInt(r.querySelector('.serviceId').value),
    cloth: parseInt(r.querySelector('.clothId').value),
    quantity: parseInt(r.querySelector('.quantity').value),
    unit_price: parseInt(r.querySelector('.unitPrice').value)
  }));

  const res = await fetch('/orders/ordercreate/', {
    method:'POST',
    headers:{'Content-Type':'application/json','X-CSRFToken':csrftoken},
    body: JSON.stringify({phone, fullname, items, discount_amount:0})
  });
  const data = await res.json();
  if(res.ok){
    messageDiv.textContent = `✅ سفارش با ID ${data.id} ثبت شد.`;
    e.target.reset();
    itemsContainer.innerHTML="";
    addItem();
  } else {
    messageDiv.textContent = "❌ خطا: "+JSON.stringify(data);
  }
}

/* =================== Recent Orders =================== */
async function fetchRecentOrders(){
  const res = await fetch('/orders/orderrecent/');
  const data = await res.json();
  recentOrdersDiv.innerHTML = "";
  data.forEach(order=>{
    const div = document.createElement('div');
    div.classList.add('orderRow');
    div.innerHTML = `
      <b>ID:</b> ${order.id} | 
      <b>مشتری:</b> ${order.customer_name} | 
      <b>تلفن:</b> ${order.customer_phone} | 
      <b>وضعیت:</b> ${order.status} | 
      <b>مبلغ:</b> ${order.final_amount} | 
      <b>تحویل:</b> ${order.delivery_time || '-'} 
      <br>
      <button onclick="editOrder(${order.id})">✏️ ویرایش</button>
      <button onclick="deleteOrder(${order.id}, '${order.customer_name}')">🗑️ حذف</button>
      <select onchange="changeStatus(${order.id}, this.value)">
        <option value="">تغییر وضعیت...</option>
        ${statusChoices.map(s=>`<option value="${s.value}">${s.label}</option>`).join('')}
      </select>
    `;
    recentOrdersDiv.appendChild(div);
  });
}

/* =================== Delete =================== */
async function deleteOrder(id, customer){
  if(!confirm(`آیا مطمئنید سفارش ${id} مربوط به ${customer} حذف شود؟`)) return;
  const res = await fetch(`/orders/orderdelete/${id}/`, {method:'DELETE', headers:{'X-CSRFToken':csrftoken}});
  if(res.ok){ messageDiv.textContent="🗑️ سفارش حذف شد."; fetchRecentOrders(); }
  else messageDiv.textContent="❌ خطا در حذف";
}

/* =================== Change Status =================== */
async function changeStatus(id, newStatus){
  if(!newStatus) return;
  const res = await fetch(`/orders/orderstatusupdate/${id}/`, {
    method:'PATCH',
    headers:{'Content-Type':'application/json','X-CSRFToken':csrftoken},
    body: JSON.stringify({status:newStatus})
  });
  if(res.ok){ messageDiv.textContent="🔄 وضعیت سفارش تغییر کرد."; fetchRecentOrders(); }
  else messageDiv.textContent="❌ خطا در تغییر وضعیت";
}

/* =================== Edit (redirect) =================== */
function editOrder(id){
  window.location.href = `/orders/editpage/${id}/`; // باید این صفحه جداگانه بسازی
}

/* =================== Init =================== */
async function init(){
  await Promise.all([fetchServicesList(), fetchClothesList(), fetchStatusChoices()]);
  addItem();
  document.getElementById('createOrderForm').addEventListener('submit', createOrder);
  document.getElementById('addItemBtn').addEventListener('click', ()=>addItem());
  document.getElementById('loadRecentBtn').addEventListener('click', fetchRecentOrders);
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
