{% load static %}

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لیست سفارش‌ها</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

</head>
<body>
  {% include 'front/header.html' %}
  {% include 'front/popup.html' %}


<div class="container mt-4">
  <h1>📋 لیست سفارش‌ها</h1>

  <div class="searchBox" style="margin-bottom:15px;">
    <input type="text" id="searchName" placeholder="نام مشتری">
    <input type="text" id="searchCode" placeholder="کد مشتری">
    <input type="text" id="searchOrder" placeholder="شماره سفارش">
    <input type="text" id="searchDate" placeholder="تاریخ (مثلاً 1404/05/12)">
    <button id="searchBtn">🔍 جستجو</button>
    <button id="resetBtn">♻️ ریست</button>
  </div>

  <div class="filterBtns mb-3">
    <button id="showAllBtn" data-express="false">📋 همه سفارشات</button>
    <button id="showExpressBtn" data-express="true">⚡ سفارشات عجله‌ای</button>
    <button id="showDeliveredBtn"> ✅ سفارشات تحویل داده شده </button>
  </div>

  <div id="recentOrders"></div>
  <div id="pagination" class="mt-3"></div>

  <!-- مودال جزئیات سفارش -->
  <div id="modalOverlay" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.45);
    backdrop-filter: blur(3px);
    z-index:1000;"></div>

  <div id="orderDetailModal" style="
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.95);
    opacity:0;
    transition:all 0.25s ease;
    background:#fff;
    border-radius:15px;
    box-shadow:0 5px 25px rgba(0,0,0,0.3);
    width:555px;
    max-width:90%;
    padding:20px;
    text-align:right;
    z-index:1001;
    direction:rtl;
    font-family:'Vazirmatn', sans-serif;">
    <h3 style="margin-top:0;text-align:center;color:#0078D7;">جزئیات سفارش</h3>
    <div id="orderDetailContent" style="max-height:666px;overflow-y:auto;margin-top:10px;"></div>
    <div style="text-align:center;margin-top:20px;">
      <button onclick="closeModal()" style="
        background:#0078D7;
        color:white;
        border:none;
        padding:8px 16px;
        border-radius:6px;
        cursor:pointer;
        font-size:14px;">بستن</button>
    </div>
  </div>

  <a href="{% url 'admin_home_page' %}" class="btn-back mt-3">بازگشت</a>
</div>

<link rel="stylesheet" href="{% static 'css/recent_order.css' %}">  
<script src="{% static 'js/recent_order.js' %}"></script>
</body>
</html>
